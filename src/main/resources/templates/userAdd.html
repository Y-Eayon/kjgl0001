<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head lang="en">
    <meta charset="UTF-8">
    <title>xxx课件管理系统</title>
    <link rel="stylesheet" href="/css/public.css"/>
    <link rel="stylesheet" href="/css/style.css"/>
</head>
<body>
<!--头部-->
<header class="publicHeader">
    <h1>xxx课件管理系统</h1>

    <div class="publicHeaderR">
        <p><span>下午好！</span><span style="color: #fff21b" th:text="${session.loginUser != null ? session.loginUser.userName : 'Admin'}">Admin</span> , 欢迎你！</p>
        <a href="/login.html">退出</a>
    </div>
</header>
<!--时间-->
<section class="publicTime">
    <span id="time">2015年1月1日 11:11  星期一</span>
    <a href="#">温馨提示：为了能正常浏览，请使用高版本浏览器！（IE10+）</a>
</section>
<!--主体内容-->
<section class="publicMian ">
    <div class="left">
        <h2 class="leftH2"><span class="span1"></span>功能列表 <span></span></h2>
        <nav>
            <ul class="list">
                 <li ><a href="/subjectList.html">科目管理</a></li>
                <li><a href="/studyList.html">课件管理</a></li>
                <li><a href="/userList.html">用户管理</a></li>
                <li><a href="/password.html">密码修改</a></li>
                <li><a href="/login.html">退出系统</a></li>
            </ul>
        </nav>
    </div>
    <div class="right">
        <div class="location">
            <strong>你现在所在的位置是:</strong>
            <span>用户管理页面 >> 用户添加页面</span>
        </div>
        <div class="providerAdd">
            <form id="addUserForm" action="/user/add" method="post">
                <!--div的class 为error是验证错误，ok是验证成功-->
                <div>
                    <label for="userId">用户账号：</label>
                    <input type="text" name="userId" id="userId" required/>
                    <span class="error-msg" id="userIdMsg">*请输入用户账号，且不能重复</span>
                </div>
                <div>
                    <label for="userName">真实姓名：</label>
                    <input type="text" name="userName" id="userName" required/>
                    <span class="error-msg" id="userNameMsg">*请输入真实姓名</span>
                </div>
                <div>
                    <label for="userPassword">用户密码：</label>
                    <input type="password" name="userPassword" id="userPassword" required/>
                    <span class="error-msg" id="passwordMsg">*密码长度必须大于6位小于20位</span>
                </div>
                <div>
                    <label for="confirmPassword">确认密码：</label>
                    <input type="password" name="confirmPassword" id="confirmPassword" required/>
                    <span class="error-msg" id="confirmMsg">*请输入确认密码</span>
                </div>
                <div>
                    <label>用户性别：</label>
                    <select name="userSex" id="userSex">
                        <option value="男">男</option>
                        <option value="女">女</option>
                    </select>
                </div>
                <div>
                    <label for="birthday">出生日期：</label>
                    <input type="date" name="birthday" id="birthday" required/>
                    <span class="error-msg" id="birthdayMsg">*</span>
                </div>
                <div>
                    <label for="userPhone">用户电话：</label>
                    <input type="text" name="userPhone" id="userPhone" required/>
                    <span class="error-msg" id="phoneMsg">*</span>
                </div>
                <div>
                    <label for="userAddress">用户地址：</label>
                    <input type="text" name="userAddress" id="userAddress"/>
                </div>
                <div>
                    <label>用户类别：</label>
                    <input type="radio" name="userType" value="0" checked/>学员
                    <input type="radio" name="userType" value="1"/>老师
                    <input type="radio" name="userType" value="2"/>管理员
                </div>
                <div class="providerAddBtn">
                    <input type="button" value="保存" onclick="submitForm()"/>
                    <input type="button" value="返回" onclick="history.back(-1)"/>
                </div>
            </form>
        </div>

    </div>
</section>
<footer class="footer">
</footer>
<script src="/js/time.js"></script>
<script>
    function submitForm() {
        // 获取表单数据
        var userId = document.getElementById('userId').value.trim();
        var userName = document.getElementById('userName').value.trim();
        var userPassword = document.getElementById('userPassword').value;
        var confirmPassword = document.getElementById('confirmPassword').value;
        var birthday = document.getElementById('birthday').value;
        var userPhone = document.getElementById('userPhone').value.trim();

        // 清空所有错误提示
        clearAllErrors();

        // 验证用户账号
        if (!userId) {
            showError('userIdMsg', '*用户账号不能为空');
            return;
        }

        // 验证真实姓名
        if (!userName) {
            showError('userNameMsg', '*真实姓名不能为空');
            return;
        }

        // 验证密码长度
        if (!userPassword) {
            showError('passwordMsg', '*密码不能为空');
            return;
        }
        if (userPassword.length < 6 || userPassword.length > 20) {
            showError('passwordMsg', '*密码长度必须在6-20位之间');
            return;
        }

        // 验证确认密码
        if (!confirmPassword) {
            showError('confirmMsg', '*请再次输入密码');
            return;
        }
        if (userPassword !== confirmPassword) {
            showError('confirmMsg', '*两次输入的密码不一致');
            return;
        }

        // 验证出生日期
        if (!birthday) {
            showError('birthdayMsg', '*出生日期不能为空');
            return;
        }

        // 验证电话号码
        if (!userPhone) {
            showError('phoneMsg', '*用户电话不能为空');
            return;
        }
        if (!/^1[3-9]\d{9}$/.test(userPhone)) {
            showError('phoneMsg', '*请输入正确的手机号码');
            return;
        }

        // 所有验证通过，提交表单
        document.getElementById('addUserForm').submit();
    }

    function showError(elementId, message) {
        var element = document.getElementById(elementId);
        element.textContent = message;
        element.style.color = 'red';
    }

    function clearAllErrors() {
        var errorElements = document.querySelectorAll('.error-msg');
        errorElements.forEach(function(el) {
            el.textContent = el.getAttribute('data-default') || '';
            el.style.color = '';
        });
    }

    // 异步检查用户账号是否重复
    document.getElementById('userId').addEventListener('blur', function() {
        var userId = this.value.trim();
        if (userId) {
            fetch('/user/checkUserId?userId=' + encodeURIComponent(userId))
                .then(response => response.json())
                .then(data => {
                    if (!data.available) {
                        showError('userIdMsg', '*该用户账号已存在，请更换');
                    }
                })
                .catch(error => console.error('检查账号失败:', error));
        }
    });
</script>

</body>
</html>
