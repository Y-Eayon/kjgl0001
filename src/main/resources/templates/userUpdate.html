<html xmlns:th="http://www.thymeleaf.org">
<head lang="en">
    <meta charset="UTF-8">
    <title>xxx课件管理系统</title>
    <link rel="stylesheet" href="/css/public.css"/>
    <link rel="stylesheet" href="/css/style.css"/>
</head>
<body>
<!--头部-->
<header class="publicHeader">
    <h1>xxx课件管理系统</h1>

    <div class="publicHeaderR">
        <p><span>下午好！</span><span style="color: #fff21b" th:text="${session.loginUser != null ? session.loginUser.userName : 'Admin'}">Admin</span> , 欢迎你！</p>
        <a href="/logout">退出</a>
    </div>
</header>
<!--时间-->
<section class="publicTime">
    <span id="time">2015年1月1日 11:11  星期一</span>
    <a href="#">温馨提示：为了能正常浏览，请使用高版本浏览器！（IE10+）</a>
</section>
<!--主体内容-->
<section class="publicMian ">
    <div class="left">
        <h2 class="leftH2"><span class="span1"></span>功能列表 <span></span></h2>
        <nav>
            <ul class="list">
                <li ><a href="/subjectList.html">科目管理</a></li>
                <li><a href="/studyList.html">课件管理</a></li>
                <li><a href="/userList.html">用户管理</a></li>
                <li><a href="/password.html">密码修改</a></li>
                <li><a href="/logout">退出系统</a></li>
            </ul>
        </nav>
    </div>
    <div class="right">
        <div class="location">
            <strong>你现在所在的位置是:</strong>
            <span>用户管理页面 >> 用户修改页面</span>
        </div>
        <div class="providerAdd">
            <form id="updateUserForm" action="/user/update" method="post">
                <!--div的class 为error是验证错误，ok是验证成功-->
                <input type="hidden" name="userId" th:value="${user.userId}" id="userId" />
                <div>
                    <label for="userName">真实姓名：</label>
                    <input type="text" name="userName" id="userName" th:value="${user.userName}" required/>
                    <span class="error-msg" id="userNameMsg">*</span>
                </div>

                <div>
                    <label>用户性别：</label>
                    <select name="userSex" id="userSex">
                        <option value="1" th:selected="${user.userSex == '1'}">男</option>
                        <option value="0" th:selected="${user.userSex == '0'}">女</option>
                    </select>
                </div>
                <div>
                    <label for="birthday">出生日期：</label>
                    <input type="date" name="birthday" id="birthday" th:value="${user.birthday}" required/>
                    <span class="error-msg" id="birthdayMsg">*</span>
                </div>
                <div>
                    <label for="userPhone">用户电话：</label>
                    <input type="text" name="userPhone" id="userPhone" th:value="${user.userPhone}" required/>
                    <span class="error-msg" id="phoneMsg">*</span>
                </div>
                <div>
                    <label for="userAddress">用户地址：</label>
                    <input type="text" name="userAddress" id="userAddress" th:value="${user.userAddress}"/>
                </div>
                <div>
                    <label>用户类别：</label>
                    <input type="radio" name="userType" value="0" th:checked="${user.userType == '0'}"/>学员
                    <input type="radio" name="userType" value="1" th:checked="${user.userType == '1'}"/>老师
                    <input type="radio" name="userType" value="2" th:checked="${user.userType == '2'}"/>管理员
                </div>
                <div class="providerAddBtn">
                    <input type="button" value="保存" onclick="submitForm()"/>
                    <input type="button" value="返回" onclick="history.back(-1)"/>
                </div>
            </form>
        </div>

    </div>
</section>
<footer class="footer">
</footer>
<script src="/js/time.js"></script>
<script>
    function submitForm() {
        // 获取表单数据
        var userName = document.getElementById('userName').value.trim();
        var birthday = document.getElementById('birthday').value;
        var userPhone = document.getElementById('userPhone').value.trim();

        // 清空所有错误提示
        clearAllErrors();

        // 验证真实姓名
        if (!userName) {
            showError('userNameMsg', '*真实姓名不能为空');
            return;
        }

        // 验证出生日期
        if (!birthday) {
            showError('birthdayMsg', '*出生日期不能为空');
            return;
        }

        // 验证电话号码
        if (!userPhone) {
            showError('phoneMsg', '*用户电话不能为空');
            return;
        }
        if (!/^1[3-9]\d{9}$/.test(userPhone)) {
            showError('phoneMsg', '*请输入正确的手机号码');
            return;
        }

        // 所有验证通过，提交表单
        document.getElementById('updateUserForm').submit();
    }

    function showError(elementId, message) {
        var element = document.getElementById(elementId);
        element.textContent = message;
        element.style.color = 'red';
    }

    function clearAllErrors() {
        var errorElements = document.querySelectorAll('.error-msg');
        errorElements.forEach(function(el) {
            el.textContent = '*';
            el.style.color = '';
        });
    }

    // 页面加载时显示错误信息（如果有）
    window.onload = function() {
        var urlParams = new URLSearchParams(window.location.search);
        var error = urlParams.get('error');
        if (error) {
            alert(decodeURIComponent(error));
        }
    };
</script>

</body>
</html>
