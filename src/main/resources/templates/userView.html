<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head lang="en">
    <meta charset="UTF-8">
    <title>xxx课件管理系统</title>
    <link rel="stylesheet" href="/css/public.css"/>
    <link rel="stylesheet" href="/css/style.css"/>
</head>
<body>
<!--头部-->
<header class="publicHeader">
    <h1>xxx课件管理系统</h1>

    <div class="publicHeaderR">
        <p><span>下午好！</span><span style="color: #fff21b" th:text="${session.loginUser != null ? session.loginUser.userName : 'Admin'}">Admin</span> , 欢迎你！</p>
        <a href="/login.html">退出</a>
    </div>
</header>
<!--时间-->
<section class="publicTime">
    <span id="time">2015年1月1日 11:11  星期一</span>
    <a href="#">温馨提示：为了能正常浏览，请使用高版本浏览器！（IE10+）</a>
</section>
<!--主体内容-->
<section class="publicMian ">
    <div class="left">
        <h2 class="leftH2"><span class="span1"></span>功能列表 <span></span></h2>
        <nav>
            <ul class="list">
                <li ><a href="/subjectList.html">科目管理</a></li>
                <li><a href="/studyList.html">课件管理</a></li>
                <li><a href="/userList.html">用户管理</a></li>
                <li><a href="/password.html">密码修改</a></li>
                <li><a href="/login.html">退出系统</a></li>
            </ul>
        </nav>
    </div>
    <div class="right">
        <div class="location">
            <strong>你现在所在的位置是:</strong>
            <span>用户管理页面 >> 用户信息查看页面</span>
        </div>
        <div class="providerView">
            <p><strong>用户账号：</strong><span th:text="${user.userId}"></span></p>
            <p><strong>真实姓名：</strong><span th:text="${user.userName}"></span></p>
            <p><strong>用户性别：</strong><span th:text="${user.userSex}"></span></p>
            <p><strong>出生日期：</strong><span th:text="${user.birthday}"></span></p>
            <p><strong>用户电话：</strong><span th:text="${user.userPhone}"></span></p>
            <p><strong>用户地址：</strong><span th:text="${user.userAddress}"></span></p>
            <p><strong>用户类别：</strong>
                <span th:if="${user.userType == '0'}">学员</span>
                <span th:if="${user.userType == '1'}">老师</span>
                <span th:if="${user.userType == '2'}">管理员</span>
            </p>
            <p><strong>创建时间：</strong><span th:text="${user.createTime}"></span></p>

            <a href="javascript:history.back(-1)">返回</a>
        </div>
    </div>
</section>
<footer class="footer">
</footer>
<script src="/js/time.js"></script>

</body>
</html>
